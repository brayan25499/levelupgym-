<app-navbar *ngIf="showLayout()" />

<main>
  <router-outlet />
</main>

<app-footer *ngIf="showLayout()" />

<!-- GLOBAL ALERT OVERLAY -->
<div class="alert-overlay" *ngIf="alertService.currentAlert()">
  <div class="alert-box" [ngClass]="alertService.currentAlert()?.type || 'info'">
    <div class="alert-icon-wrapper">
      <span *ngIf="alertService.currentAlert()?.type === 'success'">✓</span>
      <span *ngIf="alertService.currentAlert()?.type === 'error'">✕</span>
      <span *ngIf="alertService.currentAlert()?.type === 'info'">ℹ</span>
      <span *ngIf="alertService.currentAlert()?.type === 'confirm'">?</span>
    </div>
    <h2 class="alert-title">{{ alertService.currentAlert()?.title }}</h2>
    <p class="alert-msg">{{ alertService.currentAlert()?.message }}</p>
    
    <div class="alert-buttons">
      <ng-container *ngIf="alertService.currentAlert()?.type !== 'confirm'">
        <button class="alert-btn btn-ok" (click)="handleOk()">ENTENDIDO</button>
      </ng-container>
      <ng-container *ngIf="alertService.currentAlert()?.type === 'confirm'">
        <button class="alert-btn btn-no" (click)="handleNo()">CANCELAR</button>
        <button class="alert-btn btn-yes" (click)="handleYes()">CONFIRMAR</button>
      </ng-container>
    </div>
  </div>
</div>

<!-- SESSION EXPIRATION WARNING MODAL -->
<div class="alert-overlay" *ngIf="sessionService.showWarningModal()">
  <div class="alert-box info" style="border-top: 5px solid #ffcc00; max-width: 450px;">
    <div class="alert-icon-wrapper" style="background: rgba(255, 204, 0, 0.1); color: #ffcc00;">
      <span>⚠️</span>
    </div>
    <h2 class="alert-title" style="color: #ffcc00;">SESIÓN POR EXPIRAR</h2>
    <p class="alert-msg">Tu sesión está a punto de expirar por inactividad.</p>
    
    <div class="alert-buttons" style="display: flex; gap: 1rem; width: 100%; justify-content: center; margin-top: 1.5rem;">
      <button class="alert-btn btn-no" style="flex: 1; margin: 0;" (click)="sessionService.closeSessionManual()">CERRAR SESIÓN</button>
      <button class="alert-btn btn-yes" style="flex: 1; background: #ffcc00; color: #000; margin: 0;" (click)="sessionService.renewSession()">CONTINUAR SESIÓN</button>
    </div>
  </div>
</div>
