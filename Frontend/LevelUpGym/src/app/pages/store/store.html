<div id="page-store" class="page">
  <section class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-content">
      <div class="section-tag">TIENDA VIRTUAL</div>
      <h1 class="page-title">FUEL YOUR <span class="accent">GAINS</span></h1>
    </div>
  </section>

  <section class="store-section">
    <div class="container">

      <!-- FILTROS -->
      <div class="store-filters">
        <button class="filter-btn active">TODOS</button>
        <button class="filter-btn">PROTEÍNAS</button>
        <button class="filter-btn">SUPLEMENTOS</button>
        <button class="filter-btn">ACCESORIOS</button>
      </div>

      <!-- CART BADGE -->
      <div class="cart-float" (click)="goToCart()">
        🛒 <span id="cart-count">{{ cartService.getTotalItems() }}</span>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="products-grid" id="productsGrid" *ngIf="!loading()">
        <div class="product-card" *ngFor="let product of products()">
          <div class="product-img">
            <img [src]="getProductImage(product.nombre)" [alt]="product.nombre" class="product-real-image">
          </div>
          <div class="product-info">
            <span class="product-cat">PRODUCTO</span>
            <h3>{{ product.nombre }}</h3>
            <p>{{ product.descripcion }}</p>
            <div class="product-footer">
              <span class="product-price">${{ product.precioVenta | number }}</span>
              <button class="add-to-cart" (click)="addToCart(product)">+ AÑADIR</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
